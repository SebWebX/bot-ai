<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechBot AI</title>
  </head>
  <body>
    <div id="app" role="application">
      <aside class="sidebar">
        <div class="sidebar__brand" aria-label="TechBot AI - Asistente de tienda">
            <span class="sidebar__logo"></span>
            <div class="sidebar__brand-text">
              <span class="sidebar__brand-name">TechBot AI</span>
              <span class="sidebar__brand-sub">Asistente de tienda</span>
            </div>
        </div>

        <nav class="sidebar__nav" aria-label="Navegación principal">
          <p class="sidebar__label">Conversaciones</p>
          <ul class="sidebar__list">
            <li class="sidebar__item sidebar__item--active">
              <button class="sidebar__item-btn" type="button">Chat actual</button>
            </li>
            <li class="sidebar__item">
              <button class="sidebar__item-btn" type="button">Pedido #4821</button>
            </li>
            <li class="sidebar__item">
              <button class="sidebar__item-btn" type="button">Consulta productos</button>
            </li>
          </ul>

          <p class="sidebar__label">Accesos rápidos</p>
          <ul class="sidebar__list">
            <li class="sidebar__item">
              <button class="sidebar__item-btn" type="button">Rastreo rapido</button>
            </li>
            <li class="sidebar__item">
              <button class="sidebar__item-btn" type="button">Garantías</button>
            </li>
            <li class="sidebar__item">
              <button class="sidebar__item-btn" type="button">Métodos de pago</button>
            </li>
          </ul>
        </nav>

        <div class="sidebar__status" aria-label="Estado: IA activa con Gemini">IA activa - Gemini</div>
      </aside>
      <main class="chat">
        <header class="chat__topbar">
          <div class="chat__topbar-info">
            <div class="chat__topbar-avatar"></div>
            <div class="chat__topbar-text">
              <span class="chat__topbar-name">Asistente TechBot</span>
              <span class="chat__topbar-sub">Siempre disponible</span>
            </div>
          </div>

          <span class="chat__topbar-badge"  role="status" aria-label="Estado: en línea">En línea</span>
        </header>
        <section class="chat__messages" aria-live="polite" aria-label="Conversación">
          <div class="chat__message chat__message--user" aria-label="Tu mensaje">
            <div class="chat__message-avatar">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <circle cx="6" cy="4.5" r="2" fill="#534AB7"/>
                <path d="M1.5 11c0-2.485 2.015-4.5 4.5-4.5s4.5 2.015 4.5 4.5" stroke="#534AB7" stroke-width="1" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="chat__message-body">
              <span class="chat__message-bubble">Hola</span>
              <time class="chat__message-time" datetime="17:40">17:40 hrs</time>
            </div>
          </div>

          <div class="chat__message chat__message--bot" aria-label="Mensaje del asistente">
            <div class="chat__message-avatar">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <circle cx="6" cy="6" r="3.5" stroke="#534AB7" stroke-width="1"/>
                <path d="M6 3.5v2.5l1.5 1.5" stroke="#534AB7" stroke-width="1" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="chat__message-body">
              <span class="chat__message-bubble">¡Hola!, Soy tu TechBot, tu asistente en esta tienda virtual. ¿En qué puedo ayudarte?</span>
              <time class="chat__message-time" datetime="17:40">17:40 hrs</time>
            </div>
          </div>

          <div class="chat__message chat__message--user" aria-label="Tu mensaje">
            <div class="chat__message-avatar">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <circle cx="6" cy="4.5" r="2" fill="#534AB7"/>
                <path d="M1.5 11c0-2.485 2.015-4.5 4.5-4.5s4.5 2.015 4.5 4.5" stroke="#534AB7" stroke-width="1" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="chat__message-body">
              <span class="chat__message-bubble">¿Tiene Macbook Pro?</span>
              <time class="chat__message-time" datetime="17:41">17:41 hrs</time>
            </div>
          </div>
        </section>
        <footer class="chat__inputbar">
          <input class="chat__inputbar-field" type="text" placeholder="Escribe tu mensaje..." aria-label="Escribe tu mensaje">
          <button class="chat__inputbar-send" type="button" aria-label="Enviar mensaje">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M2 8l12-6-6 12V9L2 8z" fill="white"/>
            </svg>
          </button>
        </footer>
      </main>
    </div>
    <script type="module" src="/src/ts/main.ts"></script>
  </body>
</html>
